<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Страница не найдена</title>

  <style>
    @font-face {
      font-family: 'Montserrat';
      src: url("/assets/fonts/Montserrat-Regular.ttf") format('truetype');
      font-weight: 500;
      font-display: swap;
    }

    @font-face {
      font-family: 'Montserrat';
      src: url("/assets/fonts/Montserrat-SemiBold.ttf") format('truetype');
      font-weight: 600;
      font-display: swap;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 20px;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      background-color: #FFFFEE;
      background-image: url('/assets/media/404.png');
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;

      font-family: 'Montserrat', sans-serif;
      text-align: center;
    }

    .title {
      font-size: clamp(28px, 6vw, 72px);
      font-weight: 600;
      color: #C70709;
      max-width: 900px;
      margin-bottom: 20px;
    }

    .subtitle {
      font-size: clamp(18px, 4.5vw, 36px);
      font-weight: 500;
      color: #C70709;
      margin-bottom: 30px;
      max-width: 700px;
    }

    .promo {
      font-size: clamp(16px, 4vw, 32px);
      color: black;
      max-width: 700px;
      line-height: 1.4;
    }

    .promo span {
      color: #C70709;
      font-weight: 600;
    }

    /* 📱 Дополнительная оптимизация под маленькие экраны */
    @media (max-width: 480px) {
      body {
        background-size: 90%;
        padding: 15px;
      }

      .title {
        margin-bottom: 15px;
      }

      .subtitle {
        margin-bottom: 20px;
      }
    }
  </style>
</head>

<body>

  <div class="title">
    круто, что тебе интересен наш сайт
  </div>

  <div class="subtitle">
    но страница ещё в разработке
  </div>

  <div class="promo">
    даем промокод <span>«вишнёвый»</span> на 5% при покупке
  </div>

</body>

</html>
