<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets\styles\main.css">

    <title>Document</title>
</head>

<body>
    <div class="preview container">
        <header>
            <div class="header">
                <div class="header-left">
                    <div class="menu-icon">
                        <img src="assets/icons/menu-icon.svg" alt="arrow">
                    </div>
                </div>

                <div class="logo">Изнанка</div>

                <div class="header-right">
                    <div class="header-icons">
                        <img src="assets/icons/vk-icon.svg" alt="arrow">
                        <img src="assets/icons/telegram-icon.svg" alt="arrow">
                        <img src="assets/icons/main-icon.svg" alt="arrow">
                        <img src="assets/icons/cart-icon.svg" alt="arrow">
                    </div>
                </div>
            </div>
            <div class="marquee">
                <span>

            </div>
        </header>
        <div class="preview-content container">
            <div id="preview-content-left">
                <img src="assets\media\base-record-player.png" alt="arrow">

            <div id="preview-content-right">

                    <h1>фигурные виниловые</h1>

                </div>
                <button>мне надо</button>
            </div>
        </div>
    </div>


    <div class="intro container">
        <div class="video-wrap">
            <video pip="false" autoplay muted playsinline controlslist="nofullscreen noremoteplayback nodownload"
                preload="metadata" poster="assets\media\end.png">
                <source src="assets/media/nimate.mp4">
            </video>
        </div>
    </div>

    <div class="about_us container"></div>
    <script src="assets\js\app.js"></script>

</html>
